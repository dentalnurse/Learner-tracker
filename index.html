<main class="main">

    </div>
    <div class="form-card">
      <div class="form-grid">
        <div class="form-row full"><label>Full name</label><input id="add-name" placeholder="e.g. Sarah Jones"></div>
        <div class="form-row full"><label>Cohort / intake</label><input id="add-cohort" placeholder="e.g. March 26 Diploma"></div>
        <div class="form-row full"><label>Course type</label>

            <option value="ohe">OHE Certificate</option>
          </select>
        </div>

        <div class="form-row"><label>Planned end date</label><input id="add-end" type="date"></div>
        <div class="form-row full"><label>Exam date (if known)</label><input id="add-exam" type="date"></div>

      </div>
      <div style="margin-top:20px">

    </div>
  </div>
</main>

function badge(s){
  if(s==='Completed')           return '<span class="sbdg s-done">Completed</span>';
  if(s==='Requires amendments') return '<span class="sbdg s-amend">Requires amendments</span>';
  if(s==='In Progress')         return '<span class="sbdg s-prog">In progress</span>';
  return '<span class="sbdg s-none">Not started</span>';
}
function norm(s){
  if(!s) return 'Not started';
  if(s==='Requires Amendment'||s==='Requires amendments') return 'Requires amendments';
  if(s==='In Progress') return 'In Progress';
  if(s==='Completed') return 'Completed';
  return 'Not started';
}
function initials(n){return n.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}

function ubdgClass(u){
  if(u==='SO') return 'ubdg ubdg-so';

  if(u==='PCA') return 'ubdg ubdg-pca';

}
function ubdgLabel(u){return typeof u==='number'?`Unit ${u}`:u}

function load(){
  try{
    const r=localStorage.getItem('lpt-v5');
    if(r){
      const db=JSON.parse(r);
      // Migrate: attach per-learner acs and ttRows if not already present
      db.learners.forEach(l=>{
        if(!l.acs) l.acs=acList(l).map(ac=>({...ac}));
        if(!l.ttRows) l.ttRows=ttLabels(l).map((t,i)=>({label:t.label,reqs:t.reqs||'',deadline:l.timetable[i]||''}));
        if(l.notes===undefined) l.notes='';
        // Ensure progress length matches acs length
        while(l.progress.length<l.acs.length) l.progress.push('Not started');
      });
      return db;
    }
  }catch(e){}
  return getDefault();
}

  const al=acList(l);
  const completedN=al.reduce((a,ac,i)=>a+(l.progress[i]==='Completed'?ac.n:0),0);
  const totalN=al.reduce((a,ac)=>a+ac.n,0);
  const amend=l.progress.filter(s=>s==='Requires amendments').length;
  const pct=Math.round((completedN/totalN)*100);
  return{completedN,totalN,amend,pct};
}

  if(pct>=50) return['On track','risk-on'];
  if(pct>=25) return['Monitor','risk-watch'];

function handleTTDrop(event, mode, li){

function extractDatesFromText(text){
  // Match dates like "Monday 30 March 2026", "30 March 2026", "Mon 30 Mar 2026" etc.
  const months = {january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12,
    jan:1,feb:2,mar:3,apr:4,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  const lines = text.split('\n');
  const dates = [];
  const dateRe = /\b(\d{1,2})(?:st|nd|rd|th)?\s+(january|february|march|april|may|june|july|august|september|october|november|december|jan|feb|mar|apr|jun|jul|aug|sep|oct|nov|dec)\s+(20\d{2})\b/gi;
  for(const line of lines){
    const matches = [...line.matchAll(dateRe)];
    if(matches.length > 0){
      const m = matches[0];
      const day = m[1].padStart(2,'0');
      const mon = m[2].charAt(0).toUpperCase()+m[2].slice(1,3).toLowerCase();
      const yr = m[3];
      dates.push(`${day} ${mon} ${yr}`);
    }
  }
  return dates;
}

function parseTTDocx(file, mode, learnerIdx){
  if(!file) return;
  if(typeof mammoth === 'undefined'){
    alert('The mammoth library has not loaded yet. Please check your internet connection and try again.');
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e){
    mammoth.extractRawText({arrayBuffer: e.target.result})
      .then(function(result){
        const dates = extractDatesFromText(result.value);
        if(dates.length === 0){
          alert('No dates found in this document. Please check it is the correct timetable file.');
          return;
        }
        if(mode === 'add'){
          // Fill the textarea and update zone label
          document.getElementById('add-timetable').value = dates.join('\n');
          const zone = document.getElementById('add-tt-zone');
          zone.classList.add('loaded');
          document.getElementById('add-tt-label').textContent = '✓ ' + dates.length + ' dates read from ' + file.name;
        } else if(mode === 'edit' && learnerIdx !== undefined){
          const l = DB.learners[learnerIdx];
          dates.forEach((d,i)=>{ if(i < l.timetable.length) l.timetable[i] = d; });
          save();
          renderTimetable();
          const m = document.getElementById('tt-saved');
          if(m){m.style.display='inline';m.textContent='✓ '+dates.length+' dates imported';setTimeout(()=>{m.style.display='none';m.textContent='✓ Saved';},3000);}
        }
      })
      .catch(function(err){ alert('Could not read the document: ' + err.message); });
  };
  reader.readAsArrayBuffer(file);
}

      </div>
      <table class="tbl">
        <thead><tr><th>Unit</th><th>AC reference</th><th style="text-align:center">No.</th><th>Status</th><th></th></tr></thead>
        <tbody>${acRows}</tbody>
      </table>
      <div class="save-row">
        <button class="btn-save" onclick="saveACs(${cEdit})">Save AC changes</button>
        <span id="ac-saved-${cEdit}" class="saved-msg">✓ Saved</span>
      </div>
    </div>`;
  learnerBar('edit-btns',cEdit,'selectEdit');
}
function editField(li,field,val){DB.learners[li][field]=val;}
function saveEdit(li){
  save(); renderDashboard();
  const m=document.getElementById('edit-saved-'+li);
  if(m){m.style.display='inline';setTimeout(()=>{m.style.display='none';renderEdit();},1500);}
}
function selectEdit(i){cEdit=i;renderEdit()}
function deleteLearner(li){
  const name=DB.learners[li].name;
  if(!confirm('Delete '+name+'? This cannot be undone.'))return;
  DB.learners.splice(li,1);
  cEdit=Math.max(0,Math.min(cEdit,DB.learners.length-1));
  if(cDash>=DB.learners.length)cDash=Math.max(0,DB.learners.length-1);
  if(cMark>=DB.learners.length)cMark=Math.max(0,DB.learners.length-1);
  if(cTT>=DB.learners.length)cTT=Math.max(0,DB.learners.length-1);
  save(); renderEdit(); renderDashboard();
}
function editAC(li,ai,field,val){
  const l=DB.learners[li];
  if(!l.acs) return;
  l.acs[ai][field]=val;
  if(field==='status') l.progress[ai]=val;
}
function addAC(li){
  const l=DB.learners[li];
  if(!l.acs) l.acs=[];
  l.acs.push({unit:'',ref:'',n:1});
  l.progress.push('Not started');
  save(); renderEdit();
}
function deleteAC(li,ai){
  const l=DB.learners[li];
  l.acs.splice(ai,1);
  l.progress.splice(ai,1);
  save(); renderEdit();
}
function saveACs(li){
  // sync progress from acs statuses
  const l=DB.learners[li];
  l.acs.forEach((ac,i)=>{ if(ac.status) l.progress[i]=ac.status; });
  save();
  const m=document.getElementById('ac-saved-'+li);
  if(m){m.style.display='inline';setTimeout(()=>{m.style.display='none';renderDashboard();},1500);}
}
function bulkStatus(li,status){
  const l=DB.learners[li];
  l.progress=l.progress.map(()=>status);
  if(l.acs) l.acs.forEach(ac=>ac.status=status);
  save(); renderEdit(); renderDashboard();
}

function switchTab(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='dashboard')renderDashboard();
  if(name==='marking')renderMarking();
  if(name==='timetable')renderTimetable();
  if(name==='edit')renderEdit();
}

window.onload = () => {
    renderDashboard();
};
</script>
</body>
</html>
